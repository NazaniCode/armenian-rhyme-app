<!doctype html>
<html lang="hy">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Armenian Rhyme Finder</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
            integrity="sha512-Sw24kTx5cDIeEJD7BqXc9E+u6KDAdAm8YGtS+wGGyRyvE4s46HoPazTA/gkGEXLMaLLfi5LEAWuU5Bc3+ay5PA=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: radial-gradient(
                    120% 120% at 8% 0%,
                    #cde8ff 0%,
                    #f3eeff 40%,
                    #ffffff 78%
                );
                min-height: 100vh;
                padding: 32px 24px 72px;
                color: #1d1d35;
            }

            .container {
                max-width: 960px;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                gap: 32px;
            }

            .top-nav {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 16px 24px;
                border-radius: 24px;
                background: rgba(255, 255, 255, 0.6);
                backdrop-filter: blur(18px);
                border: 1px solid rgba(255, 255, 255, 0.65);
                box-shadow: 0 25px 55px rgba(124, 110, 255, 0.18);
            }

            .brand {
                display: flex;
                align-items: center;
                gap: 14px;
            }

            .brand-icon {
                width: 44px;
                height: 44px;
                display: grid;
                place-items: center;
                border-radius: 50%;
                background: linear-gradient(135deg, #5f6fff 0%, #a951ff 100%);
                color: #fff;
                font-size: 1.4rem;
            }

            .brand-text {
                display: flex;
                flex-direction: column;
                gap: 2px;
            }

            .brand-title {
                font-size: 1.05rem;
                font-weight: 600;
                color: #1d1d35;
                letter-spacing: 0.02em;
            }

            .brand-subtitle {
                font-size: 0.85rem;
                color: #6b6b90;
            }

            .search-section {
                background: rgba(255, 255, 255, 0.65);
                padding: 32px;
                border-radius: 28px;
                backdrop-filter: blur(18px);
                border: 1px solid rgba(255, 255, 255, 0.7);
                box-shadow: 0 45px 95px rgba(124, 110, 255, 0.22);
                display: flex;
                flex-direction: column;
                gap: 20px;
                position: relative;
                overflow: visible;
                z-index: 0;
            }

            .search-section::before {
                content: "";
                position: absolute;
                inset: 12px;
                border-radius: 22px;
                border: 1px solid rgba(255, 255, 255, 0.25);
                pointer-events: none;
                z-index: -1;
            }

            .search-container {
                display: grid;
                grid-template-columns: minmax(0, 1.8fr) auto auto;
                gap: 18px;
                align-items: end;
            }

            .input-group {
                position: relative;
                display: flex;
                flex-direction: column;
                gap: 10px;
                min-width: 0;
            }

            .input-group label {
                font-weight: 600;
                color: #45456b;
            }

            .input-group input,
            .input-group select {
                width: 100%;
                padding: 14px 18px;
                border: 1px solid #dfe4ff;
                border-radius: 16px;
                font-size: 1rem;
                background: rgba(255, 255, 255, 0.85);
                color: #1d1d35;
                box-shadow: 0 18px 40px rgba(119, 113, 255, 0.12);
                transition:
                    border-color 0.3s ease,
                    box-shadow 0.3s ease;
            }

            .input-group input:focus,
            .input-group select:focus {
                outline: none;
                border-color: #5f6fff;
                box-shadow: 0 22px 45px rgba(109, 103, 255, 0.2);
            }

            .input-group input::placeholder {
                color: #9aa0c2;
            }

            .toggle-group {
                display: flex;
                align-items: center;
                justify-content: flex-end;
            }

            .toggle {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                font-weight: 600;
                color: #45456b;
                cursor: pointer;
                user-select: none;
            }

            .toggle input {
                width: 20px;
                height: 20px;
                accent-color: #5f6fff;
            }

            .toggle-label {
                font-size: 0.95rem;
            }

            .autocomplete-list {
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                margin-top: 6px;
                background: rgba(255, 255, 255, 0.95);
                border: 1px solid rgba(223, 228, 255, 0.9);
                border-radius: 18px;
                max-height: 220px;
                overflow-y: auto;
                box-shadow: 0 24px 48px rgba(105, 103, 255, 0.18);
                backdrop-filter: blur(14px);
                z-index: 100;
            }

            .autocomplete-item {
                padding: 12px 18px;
                cursor: pointer;
                border-bottom: 1px solid rgba(223, 228, 255, 0.6);
            }

            .autocomplete-item:last-child {
                border-bottom: none;
            }

            .autocomplete-item:hover {
                background-color: rgba(236, 239, 255, 0.65);
            }

            button {
                padding: 14px 30px;
                background: linear-gradient(135deg, #5f6fff 0%, #a951ff 100%);
                color: #fff;
                border: none;
                border-radius: 18px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                gap: 10px;
                box-shadow: 0 18px 40px rgba(111, 108, 255, 0.35);
                transition:
                    transform 0.2s ease,
                    box-shadow 0.2s ease;
            }

            button:hover {
                transform: translateY(-3px);
                box-shadow: 0 22px 45px rgba(111, 108, 255, 0.4);
            }

            button:active {
                transform: translateY(-1px);
            }

            button:focus-visible {
                outline: 2px solid rgba(95, 111, 255, 0.45);
                outline-offset: 4px;
            }

            .button-icon {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                font-size: 1.1rem;
            }

            .loading {
                display: none;
                text-align: center;
                padding: 24px;
                color: #6b6b90;
            }

            .loading-inline {
                display: none;
                text-align: center;
                padding: 24px;
                color: #6b6b90;
            }

            .loading-inline .spinner {
                border-color: rgba(95, 111, 255, 0.18);
                border-top-color: #5f6fff;
            }

            .loading-inline p {
                margin-top: 12px;
            }

            .spinner {
                border: 3px solid rgba(95, 111, 255, 0.15);
                border-radius: 50%;
                border-top: 3px solid #5f6fff;
                width: 32px;
                height: 32px;
                animation: spin 1s linear infinite;
                margin: 0 auto;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }

            .results-section {
                display: none;
                gap: 0;
            }

            .results-header {
                background: rgba(255, 255, 255, 0.65);
                padding: 28px 32px;
                border-radius: 28px 28px 0 0;
                border: 1px solid rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(16px);
                box-shadow: 0 35px 80px rgba(124, 110, 255, 0.18);
            }

            .result-count {
                color: #6b6b90;
                font-size: 1.05rem;
                margin-top: 6px;
            }

            .results-container {
                background: rgba(255, 255, 255, 0.82);
                border-radius: 0 0 28px 28px;
                border: 1px solid rgba(255, 255, 255, 0.7);
                border-top: none;
                overflow: hidden;
                box-shadow: 0 45px 95px rgba(124, 110, 255, 0.18);
            }

            .rhyme-item {
                padding: 22px 32px;
                border-bottom: 1px solid rgba(223, 228, 255, 0.6);
                transition:
                    background-color 0.2s ease,
                    transform 0.2s ease;
            }

            .rhyme-item:last-child {
                border-bottom: none;
            }

            .rhyme-item:hover {
                background-color: rgba(236, 239, 255, 0.55);
                transform: translateY(-2px);
            }

            .rhyme-word {
                font-size: 1.4rem;
                font-weight: 600;
                color: #1d1d35;
                margin-bottom: 10px;
            }

            .rhyme-meta {
                display: flex;
                gap: 14px;
                margin-bottom: 10px;
                flex-wrap: wrap;
                align-items: center;
            }

            .badge {
                display: inline-flex;
                align-items: center;
                padding: 6px 14px;
                border-radius: 999px;
                font-size: 0.85rem;
                font-weight: 600;
                backdrop-filter: blur(10px);
            }

            .badge.perfect {
                background: rgba(76, 211, 150, 0.2);
                color: #1b7d5d;
            }

            .badge.near-perfect {
                background: rgba(136, 205, 255, 0.25);
                color: #1f6fad;
            }

            .badge.assonance {
                background: rgba(145, 148, 255, 0.25);
                color: #4346b9;
            }

            .badge.slant {
                background: rgba(255, 187, 110, 0.25);
                color: #b36a14;
            }

            .score {
                background: rgba(95, 111, 255, 0.18);
                color: #3b41b3;
                padding: 6px 14px;
                border-radius: 999px;
                font-weight: 600;
            }

            .pos {
                color: #8a8bb2;
                font-size: 0.9rem;
            }

            .definition {
                color: #5c5c7d;
                font-size: 0.95rem;
                margin-top: 6px;
                font-style: italic;
            }

            .error {
                background: rgba(255, 255, 255, 0.75);
                padding: 22px 28px;
                border-radius: 22px;
                border-left: 4px solid #ff6b6b;
                color: #b83232;
                font-weight: 600;
                margin-top: 20px;
                display: none;
                box-shadow: 0 25px 55px rgba(255, 107, 107, 0.18);
            }

            .stats {
                background: rgba(255, 255, 255, 0.55);
                color: #4c4c7a;
                padding: 12px 24px;
                border-radius: 20px;
                font-size: 0.95rem;
                text-align: center;
                margin-top: 10px;
                border: 1px solid rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(14px);
                box-shadow: 0 20px 50px rgba(124, 110, 255, 0.14);
            }

            .empty-state {
                text-align: center;
                padding: 48px 20px;
                color: #7a7ca7;
            }

            .empty-state-icon {
                font-size: 3rem;
                margin-bottom: 18px;
                opacity: 0.6;
            }

            @media (max-width: 900px) {
                .top-nav {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 8px;
                }

                .search-container {
                    grid-template-columns: 1fr;
                }

                .toggle-group {
                    justify-content: flex-start;
                }

                button {
                    width: 100%;
                    justify-content: center;
                }

                .rhyme-meta {
                    flex-direction: column;
                    align-items: flex-start;
                }
            }

            @media (max-width: 600px) {
                body {
                    padding: 24px 16px 56px;
                }

                h1 {
                    font-size: 2.2rem;
                }

                .search-section {
                    padding: 24px;
                }

                .results-header,
                .results-container {
                    border-radius: 22px;
                }

                .rhyme-item {
                    padding: 20px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <nav class="top-nav">
                <div class="brand">
                    <span class="brand-icon"
                        ><i
                            class="fa-solid fa-magnifying-glass"
                            style="color: #ffffff"
                        ></i
                    ></span>
                    <div class="brand-text">
                        <span class="brand-title">Hangavorum</span>
                        <span class="brand-subtitle"
                            >Armenian Rhyme Finder</span
                        >
                    </div>
                </div>
            </nav>

            <div class="search-section">
                <div class="search-container">
                    <div class="input-group">
                        <label for="wordInput">Մուտքագրեք բառ</label>
                        <input
                            type="text"
                            id="wordInput"
                            placeholder="Օր. գլուխ, սեր, լույս..."
                            autocomplete="off"
                        />
                        <div
                            id="autocompleteList"
                            class="autocomplete-list"
                        ></div>
                    </div>

                    <div class="toggle-group">
                        <label class="toggle">
                            <input type="checkbox" id="includeTenses" />
                            <span class="toggle-label"
                                >Ներառել խոնարհումները</span
                            >
                        </label>
                    </div>

                    <button id="searchBtn">
                        <span class="button-icon"
                            ><i
                                class="fa-solid fa-magnifying-glass"
                                style="color: #ffffff"
                            ></i></span
                        >Որոնել
                    </button>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Որոնում...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="results-section" id="resultsSection">
                <div class="results-header">
                    <h2>Արդյունքներ</h2>
                    <p class="result-count" id="resultCount"></p>
                </div>
                <div class="results-container" id="resultsContainer"></div>
                <div class="loading-inline" id="loadingMore">
                    <div class="spinner"></div>
                    <p>Ավելացնում է արդյունքները...</p>
                </div>
            </div>

            <div class="stats" id="stats"></div>
        </div>

        <script>
            const API_URL = "http://localhost:5000/api";
            const PAGE_SIZE = 50;

            let debounceTimer;
            let currentWord = "";
            let includeTenses = false;
            let offset = 0;
            let hasMore = false;
            let isLoading = false;
            let rhymesCache = [];
            let totalResults = 0;

            const wordInput = document.getElementById("wordInput");
            const autocompleteList =
                document.getElementById("autocompleteList");
            const includeTensesCheckbox =
                document.getElementById("includeTenses");
            const searchBtn = document.getElementById("searchBtn");
            const resultsSection = document.getElementById("resultsSection");
            const resultsContainer =
                document.getElementById("resultsContainer");
            const resultCount = document.getElementById("resultCount");
            const statsEl = document.getElementById("stats");
            const loadingMore = document.getElementById("loadingMore");
            const loading = document.getElementById("loading");
            const errorDiv = document.getElementById("error");

            document.addEventListener("DOMContentLoaded", async () => {
                try {
                    const response = await fetch(`${API_URL}/stats`);
                    const data = await response.json();
                    if (statsEl) {
                        statsEl.innerHTML = `📚 Բառարան՝ ${data.total_words.toLocaleString()} բառ`;
                    }
                } catch (e) {
                    console.error("Error loading stats:", e);
                }
            });

            // Autocomplete functionality
            wordInput.addEventListener("input", (e) => {
                clearTimeout(debounceTimer);
                const query = e.target.value.trim();

                if (query.length < 1) {
                    autocompleteList.innerHTML = "";
                    return;
                }

                debounceTimer = setTimeout(async () => {
                    try {
                        const response = await fetch(
                            `${API_URL}/search?q=${encodeURIComponent(query)}`,
                        );
                        const data = await response.json();

                        if (data.results.length > 0) {
                            autocompleteList.innerHTML = data.results
                                .map(
                                    (result) => `
                            <div class="autocomplete-item" onclick="selectWord('${result.word.replace(/'/g, "\\'")}')">
                                <strong>${result.word}</strong><br>
                                <span style="color: #999; font-size: 0.85em;">${result.pos} - ${result.definition}</span>
                            </div>
                        `,
                                )
                                .join("");
                        } else {
                            autocompleteList.innerHTML = "";
                        }
                    } catch (e) {
                        console.error("Error in autocomplete:", e);
                    }
                }, 300);
            });

            function selectWord(word) {
                wordInput.value = word;
                autocompleteList.innerHTML = "";
                search();
            }

            // Search functionality
            wordInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    search();
                }
            });

            searchBtn.addEventListener("click", search);

            async function search() {
                const word = wordInput.value.trim();

                if (!word) {
                    showError("Please enter a word");
                    return;
                }

                includeTenses = includeTensesCheckbox.checked;
                currentWord = word;
                offset = 0;
                hasMore = false;
                rhymesCache = [];
                totalResults = 0;
                resultsSection.style.display = "none";
                toggleLoadingMore(false);
                hideError();

                await fetchRhymes(true);
            }

            async function fetchRhymes(reset = false) {
                if (isLoading || !currentWord) {
                    return;
                }

                isLoading = true;
                if (reset) {
                    showLoading(true);
                } else {
                    toggleLoadingMore(true);
                }

                try {
                    const params = new URLSearchParams({
                        word: currentWord,
                        limit: PAGE_SIZE,
                        offset: offset,
                        include_tenses: includeTenses,
                    });
                    const response = await fetch(
                        `${API_URL}/rhymes?${params.toString()}`,
                    );

                    if (!response.ok) {
                        throw new Error("Network response was not ok");
                    }

                    const data = await response.json();
                    const newRhymes = data.rhymes || [];

                    totalResults = data.total ?? newRhymes.length;
                    hasMore =
                        data.has_more !== undefined
                            ? data.has_more
                            : rhymesCache.length + newRhymes.length <
                              totalResults;
                    offset += newRhymes.length;

                    if (reset) {
                        resultsContainer.innerHTML = "";
                        rhymesCache = [...newRhymes];
                    } else {
                        rhymesCache = rhymesCache.concat(newRhymes);
                    }

                    renderResults({
                        rhymes: newRhymes,
                        word: data.word,
                        total: totalResults,
                        append: !reset,
                    });
                } catch (error) {
                    showError("Error searching for rhymes: " + error.message);
                } finally {
                    if (reset) {
                        showLoading(false);
                    } else {
                        toggleLoadingMore(false);
                    }
                    isLoading = false;
                }
            }

            function renderResults({ rhymes, word, total, append }) {
                if (!rhymesCache.length) {
                    resultCount.textContent = `No rhymes found for "${word}"`;
                    resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <p>No rhymes found for "${word}"</p>
                    </div>
                `;
                    resultsSection.style.display = "block";
                    return;
                }

                const totalDisplay =
                    total > 0
                        ? total.toLocaleString()
                        : rhymesCache.length.toLocaleString();
                resultCount.textContent = `Showing ${rhymesCache.length} of ${totalDisplay} rhymes for "${word}"`;

                if (rhymes.length) {
                    const itemsHtml = rhymes.map(createRhymeMarkup).join("");
                    if (append) {
                        resultsContainer.insertAdjacentHTML(
                            "beforeend",
                            itemsHtml,
                        );
                    } else {
                        resultsContainer.innerHTML = itemsHtml;
                    }
                }

                resultsSection.style.display = "block";
            }

            function createRhymeMarkup(rhyme) {
                const formIndicator = !rhyme.is_base_form
                    ? ' <span style="color: #999; font-size: 0.85em;">(տ)</span>'
                    : "";
                const baseWord =
                    rhyme.base_word && rhyme.word !== rhyme.base_word
                        ? `<span style="color: #999; font-size: 0.85em; margin-left: 10px;">← ${rhyme.base_word}</span>`
                        : "";
                const syllableBadge =
                    rhyme.syllables_matched > 1
                        ? `<span class="score" style="color: #28a745;">🎵 ${rhyme.syllables_matched} syllables</span>`
                        : "";

                return `
                <div class="rhyme-item">
                    <div class="rhyme-word">
                        ${rhyme.word}${formIndicator}
                        ${baseWord}
                    </div>
                    <div class="rhyme-meta">
                        <span class="badge ${rhyme.label}">${rhyme.label}</span>
                        <span class="score">Similarity: ${(rhyme.similarity * 100).toFixed(1)}%</span>
                        ${syllableBadge}
                        <span class="pos">${rhyme.part_of_speech}</span>
                    </div>
                    <div class="definition">📖 ${rhyme.definition}</div>
                </div>
            `;
            }

            function handleInfiniteScroll() {
                if (
                    !hasMore ||
                    isLoading ||
                    !currentWord ||
                    resultsSection.style.display === "none"
                ) {
                    return;
                }

                const scrolledToBottom =
                    window.innerHeight + window.scrollY >=
                    document.body.offsetHeight - 200;
                if (scrolledToBottom) {
                    fetchRhymes(false);
                }
            }

            function toggleLoadingMore(show) {
                if (loadingMore) {
                    loadingMore.style.display = show ? "block" : "none";
                }
            }

            function showLoading(show) {
                if (loading) {
                    loading.style.display = show ? "block" : "none";
                }
            }

            function showError(message) {
                if (errorDiv) {
                    errorDiv.textContent = message;
                    errorDiv.style.display = "block";
                }
            }

            function hideError() {
                if (errorDiv) {
                    errorDiv.style.display = "none";
                }
            }

            window.addEventListener("scroll", handleInfiniteScroll);

            // Close autocomplete when clicking outside
            document.addEventListener("click", (e) => {
                if (e.target !== wordInput) {
                    autocompleteList.innerHTML = "";
                }
            });
        </script>
    </body>
</html>
