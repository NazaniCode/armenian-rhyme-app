<!doctype html>
<html lang="hy" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Հանգավորում · Հայերեն հանգերի որոնիչ</title>
  <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
  <link rel="icon" type="image/png" href="/favicon.png?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Armenian:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ── */
    :root {
      --bg:      #f6efe3;
      --surf:    #fffdf9;
      --ink:     #1c1710;
      --soft:    #796f5f;
      --line:    #e3d8c5;
      --acc:     #d4622e;
      --acc-h:   #be5526;
      --q-perfect:  #d4622e;
      --q-near:     #3a5e96;
      --q-asson:    #8a4a82;
      --q-slant:    #9a7a26;
    }
    [data-theme="dark"] {
      --bg:      #15110b;
      --surf:    #1e1810;
      --ink:     #f3ead9;
      --soft:    #a0937e;
      --line:    #322a1d;
      --acc:     #ef7d44;
      --acc-h:   #da6e39;
      --q-perfect:  #ef7d44;
      --q-near:     #6f93cc;
      --q-asson:    #bd84b5;
      --q-slant:    #cfa847;
    }

    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      scroll-behavior: smooth;
      color-scheme: light;
      scrollbar-width: auto;
      scrollbar-color: var(--acc) color-mix(in srgb, var(--line) 48%, transparent);
    }
    html::-webkit-scrollbar { width: 16px; }
    html::-webkit-scrollbar-track {
      background: color-mix(in srgb, var(--line) 36%, var(--bg));
    }
    html::-webkit-scrollbar-thumb {
      background: var(--acc);
      border: 4px solid color-mix(in srgb, var(--line) 36%, var(--bg));
      border-radius: 999px;
    }
    html::-webkit-scrollbar-thumb:hover {
      background: var(--acc-h);
    }
    html::-webkit-scrollbar-button {
      width: 0;
      height: 0;
      display: none;
    }
    [data-theme="dark"] { color-scheme: dark; }
    body {
      font-family: "Noto Sans Armenian", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    html.theme-ready body,
    html.theme-ready .brand-icon,
    html.theme-ready .search-box,
    html.theme-ready #wordInput,
    html.theme-ready #searchBtn,
    html.theme-ready #autocompleteList,
    html.theme-ready .autocomplete-item,
    html.theme-ready .conj-row span,
    html.theme-ready .sw,
    html.theme-ready .sw::after,
    html.theme-ready .error-msg,
    html.theme-ready .hero-kick,
    html.theme-ready .hero-word,
    html.theme-ready #resultCount,
    html.theme-ready #resultCount b,
    html.theme-ready .filter-button,
    html.theme-ready .rhyme-chip,
    html.theme-ready .chip-sim,
    html.theme-ready .chip-label,
    html.theme-ready .chip-pos,
    html.theme-ready .chip-def,
    html.theme-ready .chip-base,
    html.theme-ready .empty-state,
    html.theme-ready #stats {
      transition:
        background-color .42s cubic-bezier(.2, .8, .2, 1),
        border-color .42s cubic-bezier(.2, .8, .2, 1),
        box-shadow .42s cubic-bezier(.2, .8, .2, 1),
        color .42s cubic-bezier(.2, .8, .2, 1);
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }

    /* ── Layout ── */
    .app { max-width: 1120px; margin: 0 auto; padding: 36px 48px 80px; }

    /* ── Top bar ── */
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; }
    .brand { display: flex; align-items: center; gap: 11px; }
    .brand-icon {
      width: 32px; height: 32px; border-radius: 7px;
      background: var(--acc); display: grid; place-items: center;
      color: #fff; font-size: 17px; font-weight: 800; line-height: 1;
    }
    .brand-name { font-size: 19px; font-weight: 800; letter-spacing: -.4px; }
    .theme-btn {
      --toggle-track: #f2e7d5;
      --toggle-track-border: #d8c9b0;
      --toggle-thumb: #fffaf0;
      --toggle-active: #1c1710;
      --toggle-muted: #8d806c;
      width: 174px; height: 48px; border: 2px solid var(--toggle-track-border);
      background: var(--toggle-track); color: var(--toggle-muted);
      font-family: inherit; font-size: 16px; font-weight: 800;
      border-radius: 999px; cursor: pointer; position: relative; isolation: isolate;
      display: grid; grid-template-columns: 1fr 1fr; align-items: center;
      padding: 4px; box-shadow: inset 0 0 0 1px rgba(28, 23, 16, .04);
      transition:
        background-color .42s cubic-bezier(.2, .8, .2, 1),
        border-color .42s cubic-bezier(.2, .8, .2, 1),
        box-shadow .25s ease,
        color .42s cubic-bezier(.2, .8, .2, 1);
    }
    [data-theme="dark"] .theme-btn {
      --toggle-track: #15110b;
      --toggle-track-border: #382f22;
      --toggle-thumb: #f7eedf;
      --toggle-active: #1c1710;
      --toggle-muted: #877b68;
      box-shadow: inset 0 0 0 1px rgba(247, 238, 223, .03);
    }
    .theme-btn::before {
      content: ""; position: absolute; z-index: -1; top: 4px; bottom: 4px; left: 4px;
      width: calc(50% - 4px); border-radius: 999px; background: var(--toggle-thumb);
      box-shadow: 0 2px 8px rgba(28, 23, 16, .18);
      transition:
        transform .42s cubic-bezier(.2, .9, .15, 1),
        background-color .42s cubic-bezier(.2, .8, .2, 1),
        box-shadow .42s cubic-bezier(.2, .8, .2, 1);
    }
    [data-theme="dark"] .theme-btn::before { transform: translateX(calc(100% + 0px)); }
    .theme-btn:hover { border-color: var(--acc); }
    .theme-btn:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--acc) 45%, transparent);
      outline-offset: 3px;
    }
    .theme-option {
      min-width: 0; text-align: center; line-height: 1; color: var(--toggle-muted);
      transition: color .32s cubic-bezier(.2, .8, .2, 1), transform .32s cubic-bezier(.2, .8, .2, 1);
    }
    [data-theme="light"] .theme-option[data-mode="light"],
    [data-theme="dark"] .theme-option[data-mode="dark"] {
      color: var(--toggle-active); transform: scale(1.03);
    }

    /* ── Search ── */
    .search-wrap { position: relative; }
    .search-box {
      display: flex; align-items: stretch; gap: 0;
      background: var(--surf); border: 2px solid var(--ink);
      border-radius: 16px; overflow: hidden;
      box-shadow: 6px 6px 0 var(--ink);
      transition: box-shadow .15s;
    }
    .search-box:focus-within { box-shadow: 8px 8px 0 var(--ink); }
    #wordInput {
      flex: 1; border: none; background: transparent;
      color: var(--ink); font-family: inherit;
      font-size: 24px; font-weight: 700;
      padding: 20px 24px; outline: none; min-width: 0;
    }
    #wordInput::placeholder { color: var(--soft); font-weight: 500; }
    #searchBtn {
      border: none; background: var(--acc); color: #fff;
      font-family: inherit; font-weight: 800; font-size: 17px;
      padding: 0 38px; cursor: pointer; white-space: nowrap;
      transition: background .15s;
    }
    #searchBtn:hover { background: var(--acc-h); }

    /* Autocomplete */
    #autocompleteList {
      position: absolute; top: 100%; left: 0; right: 0; margin-top: 10px;
      background: var(--surf); border: 2px solid var(--ink); border-radius: 14px;
      max-height: 50vh; overflow-y: auto; overflow-x: hidden;
      z-index: 100; box-shadow: 6px 6px 0 var(--ink);
      scrollbar-gutter: stable;
      scrollbar-width: thin; scrollbar-color: var(--acc) transparent;
    }
    #autocompleteList::-webkit-scrollbar { width: 10px; }
    #autocompleteList::-webkit-scrollbar-track {
      background: transparent;
      margin: 10px 0;
    }
    #autocompleteList::-webkit-scrollbar-thumb {
      background: var(--acc);
      border: 3px solid var(--surf);
      border-radius: 999px;
    }
    #autocompleteList::-webkit-scrollbar-thumb:hover {
      background: var(--acc-h);
    }
    #autocompleteList::-webkit-scrollbar-button {
      width: 0;
      height: 0;
      display: none;
    }
    .autocomplete-item {
      display: flex; align-items: baseline; gap: 10px;
      padding: 13px 22px; cursor: pointer; border-bottom: 1px solid var(--line);
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: var(--bg); }
    .autocomplete-item strong { font-size: 18px; font-weight: 800; }
    .autocomplete-item span { font-size: 12.5px; color: var(--soft); }

    /* Conjugations toggle */
    .conj-row {
      display: flex; align-items: center; gap: 10px;
      margin-top: 18px; cursor: pointer; width: fit-content; user-select: none;
    }
    .conj-row input[type="checkbox"] { display: none; }
    .sw {
      width: 38px; height: 22px; border-radius: 999px;
      background: var(--line); position: relative;
      border: 1.5px solid var(--ink); transition: .18s; flex-shrink: 0;
    }
    .sw::after {
      content: ""; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--ink); transition: .18s;
    }
    #includeTenses:checked ~ .conj-row .sw,
    .sw.on { background: var(--acc); }
    .sw.on::after { transform: translateX(16px); background: #fff; }
    .conj-row span { font-size: 14px; color: var(--soft); font-weight: 600; }

    /* ── Loading ── */
    .spinner-wrap { display: flex; justify-content: center; padding: 80px 0; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--line); border-top-color: var(--acc);
      border-radius: 50%; animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-inline { display: flex; justify-content: center; padding: 32px 0; }

    /* ── Error ── */
    .error-msg {
      background: var(--surf); border: 2px solid var(--ink);
      border-left: 5px solid #c94040;
      padding: 18px 22px; border-radius: 12px;
      color: #c94040; font-weight: 700; margin-top: 28px;
      box-shadow: 4px 4px 0 var(--line);
    }

    /* ── Results ── */
    /* Hero: big query word */
    .results-hero {
      margin-top: 54px;
      display: flex; align-items: flex-end; gap: 24px; flex-wrap: wrap;
    }
    .hero-kick {
      font-size: 13px; font-weight: 800; letter-spacing: .22em;
      text-transform: uppercase; color: var(--acc); margin-bottom: 10px;
    }
    .hero-word {
      font-size: 92px; font-weight: 800; letter-spacing: -2px;
      line-height: .9; color: var(--ink);
    }
    .hero-meta { padding-bottom: 14px; }
    #resultCount { font-size: 15px; color: var(--soft); font-weight: 600; }
    #resultCount b { color: var(--acc); }

    /* POS filter pills */
    .filter-group {
      margin-top: 32px; display: flex; flex-wrap: wrap; gap: 8px;
    }
    .filter-button {
      border: 1.5px solid var(--ink); background: transparent;
      color: var(--ink); font-family: inherit; font-weight: 700;
      font-size: 13px; padding: 8px 16px; border-radius: 999px;
      cursor: pointer; transition: .13s;
    }
    .filter-button:hover { background: var(--ink); color: var(--bg); }
    .filter-button.active {
      background: var(--acc); border-color: var(--acc); color: #fff;
    }

    /* Chip grid */
    #resultsContainer {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(172px, 1fr));
      gap: 12px;
    }

    /* Individual chip */
    .rhyme-chip {
      background: var(--surf); border: 1.5px solid var(--line);
      border-radius: 13px; padding: 15px 16px 14px;
      position: relative; overflow: hidden;
      transition: transform .14s, box-shadow .14s, border-color .14s;
      cursor: default;
    }
    .rhyme-chip::before {
      content: ""; position: absolute;
      left: 0; top: 0; bottom: 0; width: 5px;
      background: var(--qc, var(--soft));
    }
    .rhyme-chip:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--ink);
      border-color: var(--ink);
    }
    .rhyme-chip[data-label="perfect"]     { --qc: var(--q-perfect); }
    .rhyme-chip[data-label="near-perfect"]{ --qc: var(--q-near);    }
    .rhyme-chip[data-label="assonance"]   { --qc: var(--q-asson);   }
    .rhyme-chip[data-label="slant"]       { --qc: var(--q-slant);   }

    .chip-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      align-items: baseline;
      gap: 8px;
    }
    .chip-word {
      min-width: 0;
      overflow: visible;
      white-space: nowrap;
      font-size: 25px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.16;
    }
    .chip-sim  {
      width: 34px;
      justify-self: end;
      text-align: right;
      font-size: 15px;
      font-weight: 700;
      color: var(--qc, var(--soft));
    }
    .chip-label {
      margin-top: 10px;
      font-size: 10.5px; font-weight: 800; letter-spacing: .04em;
      text-transform: uppercase; color: var(--qc, var(--soft));
    }
    .chip-pos  { font-size: 12px; color: var(--soft); margin-top: 7px; font-weight: 600; }
    .chip-def  {
      font-size: 12px; color: var(--soft); margin-top: 6px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .chip-base {
      font-size: 11px; color: var(--soft); margin-top: 5px;
      opacity: .7; font-style: italic;
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1; text-align: center;
      padding: 60px 20px; color: var(--soft);
    }
    .empty-state p { font-size: 16px; font-weight: 600; margin-top: 12px; }

    /* Load more / inline spinner */
    #loadingMore { display: none; }
    .inline-spinner-wrap { display: flex; justify-content: center; padding: 32px 0; }
    .inline-spinner {
      width: 26px; height: 26px;
      border: 2.5px solid var(--line); border-top-color: var(--acc);
      border-radius: 50%; animation: spin .9s linear infinite;
    }

    /* Stats footer */
    #stats {
      margin-top: 40px; text-align: center;
      font-size: 12.5px; color: var(--soft); font-weight: 600;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .app { padding: 24px 20px 60px; }
      #wordInput { font-size: 18px; padding: 16px 18px; }
      #searchBtn { padding: 0 22px; font-size: 15px; }
      .hero-word { font-size: 60px; }
      .results-hero { margin-top: 40px; }
      #resultsContainer { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <header class="top-bar">
    <div class="brand">
      <div class="brand-icon">Հ</div>
      <span class="brand-name">Հանգավորում</span>
    </div>
    <button class="theme-btn" id="themeBtn" type="button" aria-label="Փոխել գունային ռեժիմը" aria-pressed="false">
      <span class="theme-option" data-mode="light">Լույս</span>
      <span class="theme-option" data-mode="dark">Մութ</span>
    </button>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="wordInput"
        placeholder="Օր.՝ սեր, լույս, գարուն…"
        autocomplete="off" />
      <button id="searchBtn">Որոնել</button>
    </div>
    <div id="autocompleteList" style="display:none;"></div>
  </div>

  <!-- Conjugations toggle -->
  <label class="conj-row" id="conjRow">
    <input type="checkbox" id="includeTenses" />
    <span class="sw" id="conjSw"></span>
    <span>Ներառել խոնարհումներ</span>
  </label>

  <!-- Main loading spinner -->
  <div id="loading" class="spinner-wrap" style="display:none;">
    <div class="spinner"></div>
  </div>

  <!-- Error -->
  <div id="error" class="error-msg" style="display:none;"></div>

  <!-- Results section -->
  <div id="resultsSection" style="display:none;">
    <div class="results-hero">
      <div>
        <div class="hero-kick">ՀԱՅԵՐԵՆ ՀԱՆԳԵՐԻ ՈՐՈՆԻՉ</div>
        <div class="hero-word" id="heroWord"></div>
      </div>
      <div class="hero-meta">
        <div id="resultCount"></div>
      </div>
    </div>

    <!-- POS filters -->
    <div class="filter-group" id="posFilters">
      <button class="filter-button" data-filter="noun">գոյական</button>
      <button class="filter-button" data-filter="verb">բայ</button>
      <button class="filter-button" data-filter="adjective">ածական</button>
      <button class="filter-button" data-filter="adverb">մակբայ</button>
      <button class="filter-button" data-filter="name">հատուկ անուն</button>
      <button class="filter-button" data-filter="pronoun">դերանուն</button>
    </div>

    <!-- Chip grid -->
    <div id="resultsContainer"></div>

    <!-- Inline "loading more" spinner -->
    <div id="loadingMore">
      <div class="inline-spinner-wrap"><div class="inline-spinner"></div></div>
    </div>
  </div>

  <!-- Dictionary stats footer -->
  <div id="stats"></div>

</div>

<script>
  /* ─────────────────────────────────────────────────────────────
     Config & constants
  ───────────────────────────────────────────────────────────── */
  const API_URL   = window.location.origin + "/api";
  const PAGE_SIZE = 50;

  const LABEL_HY = {
    perfect:       "Կատարյալ",
    "near-perfect":"Մոտավոր",
    assonance:     "Համահնչյուն",
    slant:         "Թերի",
  };

  const POS_HY = {
    noun: "գոյական", verb: "բայ", adjective: "ածական",
    adverb: "մակբայ", pronoun: "դերանուն", name: "հատուկ անուն",
    "common noun": "գոյական", "proper noun": "հատուկ անուն",
    "given name": "հատուկ անուն", surname: "հատուկ անուն",
  };

  // Part-of-speech filter map (same logic as original)
  const FILTER_MAP = {
    noun:      ["noun","common noun"],
    verb:      ["verb"],
    adjective: ["adjective"],
    adverb:    ["adverb"],
    name:      ["proper noun","name","given name","surname"],
    pronoun:   ["pronoun"],
  };
  const POS_ALIAS_MAP = {
    n:"noun",noun:"noun",v:"verb",vb:"verb",verb:"verb",
    adj:"adjective",adjective:"adjective",adv:"adverb",adverb:"adverb",
    pron:"pronoun",pronoun:"pronoun",name:"name",
    "proper noun":"proper noun","common noun":"common noun",
    "given name":"given name",surname:"surname",
  };
  const POS_MULTI = [
    {pattern:/\bproper\s+nouns?\b/g,  replacement:"proper noun"},
    {pattern:/\bcommon\s+nouns?\b/g,  replacement:"common noun"},
    {pattern:/\bgiven\s+name\b/g,     replacement:"given name"},
    {pattern:/\bsur\s*name\b/g,       replacement:"surname"},
  ];

  /* ─────────────────────────────────────────────────────────────
     State
  ───────────────────────────────────────────────────────────── */
  let debounceTimer;
  let currentWord    = "";
  let includeTenses  = false;
  let offset         = 0;
  let hasMore        = false;
  let isLoading      = false;
  let rhymesCache    = [];
  let totalResults   = 0;
  let renderedCount  = 0;
  const activePosFilters = new Set();
  let autoLoadTimer  = null;

  /* ─────────────────────────────────────────────────────────────
     DOM refs
  ───────────────────────────────────────────────────────────── */
  const wordInput        = document.getElementById("wordInput");
  const autocompleteList = document.getElementById("autocompleteList");
  const includeTensesChk = document.getElementById("includeTenses");
  const conjSw           = document.getElementById("conjSw");
  const searchBtn        = document.getElementById("searchBtn");
  const resultsSection   = document.getElementById("resultsSection");
  const resultsContainer = document.getElementById("resultsContainer");
  const resultCount      = document.getElementById("resultCount");
  const heroWord         = document.getElementById("heroWord");
  const statsEl          = document.getElementById("stats");
  const loadingMore      = document.getElementById("loadingMore");
  const loading          = document.getElementById("loading");
  const errorDiv         = document.getElementById("error");
  const posFilterBtns    = document.querySelectorAll(".filter-button");
  const themeBtn         = document.getElementById("themeBtn");

  /* ─────────────────────────────────────────────────────────────
     Theme
  ───────────────────────────────────────────────────────────── */
  (function initTheme() {
    const saved = localStorage.getItem("hangavorum-theme") || "light";
    document.documentElement.setAttribute("data-theme", saved);
    themeBtn.setAttribute("aria-pressed", saved === "dark");
    requestAnimationFrame(() => document.documentElement.classList.add("theme-ready"));
  })();

  themeBtn.addEventListener("click", () => {
    const next = document.documentElement.getAttribute("data-theme") === "dark"
      ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("hangavorum-theme", next);
    themeBtn.setAttribute("aria-pressed", next === "dark");
  });

  /* ─────────────────────────────────────────────────────────────
     Conjugations switch visual sync
  ───────────────────────────────────────────────────────────── */
  includeTensesChk.addEventListener("change", () => {
    conjSw.classList.toggle("on", includeTensesChk.checked);
  });
  document.getElementById("conjRow").addEventListener("click", () => {
    // label wraps checkbox, so click already toggles — just sync visual
    setTimeout(() => conjSw.classList.toggle("on", includeTensesChk.checked), 0);
  });

  /* ─────────────────────────────────────────────────────────────
     Stats on load
  ───────────────────────────────────────────────────────────── */
  document.addEventListener("DOMContentLoaded", async () => {
    try {
      const r = await fetch(`${API_URL}/stats`);
      const d = await r.json();
      statsEl.textContent = `Բառարան · ${d.total_words.toLocaleString("hy")} բառ`;
    } catch (_) { /* backend not reachable in preview */ }
  });

  /* ─────────────────────────────────────────────────────────────
     Autocomplete
  ───────────────────────────────────────────────────────────── */
  wordInput.addEventListener("input", (e) => {
    clearTimeout(debounceTimer);
    const q = e.target.value.trim();
    if (!q) { hideAutocomplete(); return; }
    debounceTimer = setTimeout(async () => {
      try {
        const r = await fetch(`${API_URL}/search?q=${encodeURIComponent(q)}`);
        const d = await r.json();
        if (d.results.length) {
          autocompleteList.innerHTML = d.results.map((item) =>
            {
              const posHy = getPosLabel(item.pos);
              return `<div class="autocomplete-item" onclick="selectWord('${item.word.replace(/'/g,"\\'")}')">
                <strong>${item.word}</strong>
                <span>${posHy ? posHy + " · " : ""}${item.definition || ""}</span>
              </div>`;
            }
          ).join("");
          autocompleteList.style.display = "block";
        } else { hideAutocomplete(); }
      } catch (e) { console.error(e); }
    }, 300);
  });

  function hideAutocomplete() {
    autocompleteList.innerHTML = "";
    autocompleteList.style.display = "none";
  }

  window.selectWord = function(word) {
    wordInput.value = word;
    hideAutocomplete();
    wordInput.blur();
    search();
  };

  wordInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); hideAutocomplete(); search(); }
  });
  document.addEventListener("click", (e) => {
    if (e.target !== wordInput) hideAutocomplete();
  });

  /* ─────────────────────────────────────────────────────────────
     Search entry point
  ───────────────────────────────────────────────────────────── */
  searchBtn.addEventListener("click", () => { wordInput.blur(); search(); });

  async function search() {
    clearTimeout(debounceTimer);
    hideAutocomplete();
    const word = wordInput.value.trim();
    if (!word) { showError("Խնդրում ենք մուտքագրել բառ"); return; }
    includeTenses  = includeTensesChk.checked;
    currentWord    = word;
    offset         = 0;
    hasMore        = false;
    rhymesCache    = [];
    renderedCount  = 0;
    totalResults   = 0;
    resultsSection.style.display = "none";
    cancelAutoLoad();
    toggleLoadingMore(false);
    hideError();
    await fetchRhymes(true);
  }

  /* ─────────────────────────────────────────────────────────────
     Fetch rhymes (paginated)
  ───────────────────────────────────────────────────────────── */
  async function fetchRhymes(reset = false) {
    if (isLoading || !currentWord) return;
    isLoading = true;
    if (reset) showLoading(true); else toggleLoadingMore(true);

    try {
      const params = new URLSearchParams({
        word: currentWord, limit: PAGE_SIZE, offset,
        include_tenses: includeTenses,
      });
      const r = await fetch(`${API_URL}/rhymes?${params}`);
      if (!r.ok) throw new Error("Network response was not ok");
      const data = await r.json();

      const newRhymes = (data.rhymes || []).map(enhanceEntry);
      totalResults = data.total ?? newRhymes.length;
      hasMore = data.has_more !== undefined
        ? data.has_more
        : rhymesCache.length + newRhymes.length < totalResults;
      offset += newRhymes.length;

      if (reset) { resultsContainer.innerHTML = ""; rhymesCache = [...newRhymes]; }
      else        { rhymesCache = rhymesCache.concat(newRhymes); }

      renderResults({ word: data.word, total: totalResults, reset });
      scheduleAutoLoadIfNeeded();
    } catch (err) {
      showError("Սխալ հանգեր որոնելիս · " + err.message);
    } finally {
      if (reset) showLoading(false); else toggleLoadingMore(false);
      isLoading = false;
    }
  }

  /* ─────────────────────────────────────────────────────────────
     POS normalisation (unchanged from original)
  ───────────────────────────────────────────────────────────── */
  function normalizePos(pos) {
    if (!pos) return "";
    let n = pos.normalize("NFKD").toLowerCase()
      .replace(/[\u0300-\u036f]/g,"").replace(/[_·]/g," ")
      .replace(/[–—]/g," ").replace(/-/g," ").replace(/\./g," ")
      .replace(/&/g," and ").replace(/\s+/g," ").trim();
    if (!n) return "";
    const tags = new Set();
    POS_MULTI.forEach(({pattern,replacement}) => {
      if (n.match(pattern)) { tags.add(replacement); n = n.replace(pattern," "); }
    });
    n.replace(/\s+/g," ").trim().split(/[\s,;:/()]+/)
      .map(t => POS_ALIAS_MAP[t]||t).filter(t=>t&&t!=="and").forEach(t=>tags.add(t));
    return Array.from(tags).join(" ");
  }

  function matchesFilter(normalizedPos, key) {
    if (!normalizedPos) return false;
    if (key==="noun" && hasTag(normalizedPos,"proper noun")) return false;
    return FILTER_MAP[key].some(tag => hasTag(normalizedPos,tag));
  }
  function hasTag(n, tag) {
    return new RegExp(`(^|[\\s,;:/\\-()])${escRe(tag)}(?=$|[\\s,;:/\\-()])`)
      .test(n);
  }
  function escRe(v) { return v.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }

  function enhanceEntry(r) {
    return { ...r, _npos: normalizePos(r.part_of_speech) };
  }

  function getPosLabel(pos) {
    if (!pos) return "";
    const key = pos.toLowerCase().trim();
    const normalized = normalizePos(pos);
    const exact = POS_HY[key] || POS_HY[normalized];
    if (exact) return exact;

    const labels = Object.keys(FILTER_MAP)
      .filter(filter => matchesFilter(normalized, filter))
      .map(filter => POS_HY[filter]);
    return labels.length ? Array.from(new Set(labels)).join(", ") : pos;
  }

  /* ─────────────────────────────────────────────────────────────
     Filter helpers
  ───────────────────────────────────────────────────────────── */
  function getFiltered() {
    if (!activePosFilters.size) return [...rhymesCache];
    return rhymesCache.filter(r =>
      Array.from(activePosFilters).some(filter => matchesFilter(r._npos, filter)));
  }

  posFilterBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      const f = btn.dataset.filter;
      if (activePosFilters.has(f)) activePosFilters.delete(f);
      else activePosFilters.add(f);
      updateFilterUI();
      if (!currentWord || !rhymesCache.length) return;
      renderResults({ word: currentWord, total: totalResults, reset: false, forceRefresh: true });
      scheduleAutoLoadIfNeeded();
    });
  });

  function updateFilterUI() {
    posFilterBtns.forEach(btn => {
      const isActive = activePosFilters.has(btn.dataset.filter);
      btn.classList.toggle("active", isActive);
      btn.setAttribute("aria-pressed", String(isActive));
    });
  }
  updateFilterUI();

  function getActiveFilterLabel() {
    return Array.from(activePosFilters)
      .map(filter => POS_HY[filter] || getPosLabel(filter))
      .filter(Boolean)
      .join(", ");
  }

  /* ─────────────────────────────────────────────────────────────
     Render results
  ───────────────────────────────────────────────────────────── */
  function renderResults({ word, total, reset=false, forceRefresh=false }) {
    heroWord.textContent = word || currentWord;

    const filtered = getFiltered();

    if (!filtered.length) {
      const filterLabel = getActiveFilterLabel();
      const msg = activePosFilters.size
        ? `Ոչ մի "${filterLabel}" հանգ չի գտնվել «${word || currentWord}» բառի համար`
        : `Հանգեր չգտնվեցին «${word || currentWord}» բառի համար`;
      resultCount.innerHTML = msg;
      resultsContainer.innerHTML = `<div class="empty-state"><p>${msg}</p></div>`;
      resultsSection.style.display = "block";
      renderedCount = 0;
      return;
    }

    resultCount.innerHTML =
      `Ցուցադրվում է <b>${filtered.length.toLocaleString("hy")}</b> արդյունք` +
      (total ? ` / <span class="mono">${total.toLocaleString("hy")}</span>` : "") +
      ` · «${word || currentWord}»`;

    const hadEmptyState = !!resultsContainer.querySelector(".empty-state");
    if (reset || forceRefresh || hadEmptyState) {
      resultsContainer.innerHTML = "";
      renderedCount = 0;
    }

    const toAdd = (reset || forceRefresh || hadEmptyState)
      ? filtered : filtered.slice(renderedCount);

    if (toAdd.length) {
      const frag = document.createDocumentFragment();
      toAdd.forEach(r => frag.appendChild(createChip(r)));
      resultsContainer.appendChild(frag);
      fitChipWords();
    }

    renderedCount = filtered.length;
    resultsSection.style.display = "block";
  }

  /* ─────────────────────────────────────────────────────────────
     Chip creation
  ───────────────────────────────────────────────────────────── */
  function createChip(r) {
    const el = document.createElement("div");
    el.className = "rhyme-chip";
    el.dataset.label = r.label;

    const posKey = (r.part_of_speech || "").toLowerCase().trim();
    const posHy  = POS_HY[posKey] || getPosLabel(r.part_of_speech);
    const sylNote= r.syllables_matched > 1 ? ` · ${r.syllables_matched} վանկ` : "";
    const baseNote = (!r.is_base_form && r.base_word && r.base_word !== r.word)
      ? `<div class="chip-base">← ${r.base_word}</div>` : "";

    el.innerHTML = `
      <div class="chip-top">
        <span class="chip-word">${r.word}</span>
        <span class="chip-sim mono">${Math.round(r.similarity * 100)}</span>
      </div>
      <div class="chip-label">${LABEL_HY[r.label] || r.label}</div>
      <div class="chip-pos">${posHy}${sylNote}</div>
      ${r.definition ? `<div class="chip-def">${r.definition}</div>` : ""}
      ${baseNote}`;
    return el;
  }

  function fitChipWord(wordEl) {
    const maxSize = 25;
    const minSize = 8;
    let size = maxSize;

    wordEl.style.fontSize = `${maxSize}px`;
    if (!wordEl.clientWidth) return;

    while (wordEl.scrollWidth > wordEl.clientWidth && size > minSize) {
      size -= 0.5;
      wordEl.style.fontSize = `${size}px`;
    }

    if (wordEl.scrollWidth > wordEl.clientWidth) {
      const fittedSize = size * (wordEl.clientWidth / wordEl.scrollWidth);
      wordEl.style.fontSize = `${Math.max(6, fittedSize)}px`;
    }
  }

  function fitChipWords() {
    requestAnimationFrame(() => {
      resultsContainer.querySelectorAll(".chip-word").forEach(fitChipWord);
    });
  }

  window.addEventListener("resize", fitChipWords);

  /* ─────────────────────────────────────────────────────────────
     Infinite scroll
  ───────────────────────────────────────────────────────────── */
  window.addEventListener("scroll", () => {
    if (!hasMore || isLoading || !currentWord
        || resultsSection.style.display === "none") return;
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
      fetchRhymes(false);
    }
  });

  function cancelAutoLoad() {
    if (autoLoadTimer) {
      clearTimeout(autoLoadTimer);
      autoLoadTimer = null;
    }
  }

  function scheduleAutoLoadIfNeeded() {
    cancelAutoLoad();
    autoLoadTimer = setTimeout(() => {
      autoLoadTimer = null;
      if (!hasMore || isLoading || !currentWord
          || resultsSection.style.display === "none") return;

      const doc = document.documentElement;
      const cannotScroll = doc.scrollHeight <= window.innerHeight + 200;
      const filtered = getFiltered();
      if ((activePosFilters.size && (cannotScroll || !filtered.length))
          || (!activePosFilters.size && cannotScroll)) {
        fetchRhymes(false);
      }
    }, 0);
  }

  /* ─────────────────────────────────────────────────────────────
     UI helpers
  ───────────────────────────────────────────────────────────── */
  function showLoading(on) { loading.style.display = on ? "flex" : "none"; }
  function toggleLoadingMore(on) { loadingMore.style.display = on ? "block" : "none"; }
  function showError(msg) { errorDiv.textContent = msg; errorDiv.style.display = "block"; }
  function hideError() { errorDiv.style.display = "none"; }
</script>
</body>
</html>
